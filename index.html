<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Periodic Trainer Pro</title>

<style>
:root {
  --bg1:#050816;
  --bg2:#0b1224;
  --accent:#6366f1;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background: linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.container{
  width:100%;
  max-width:460px;
  background:rgba(15,23,42,0.85);
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
}

h1{text-align:center;font-size:20px}

label{font-size:12px;color:var(--muted);display:block;margin-top:10px}

input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0b1224;
  color:var(--text);
}

button{
  width:100%;
  margin-top:12px;
  padding:11px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{transform:translateY(-1px)}

#game{display:none;text-align:center}

#question{font-size:18px;margin:18px 0}

#feedback{min-height:20px;margin-top:10px;color:var(--muted)}

#score{font-size:12px;color:var(--muted);margin-top:10px}

.end-buttons button{
  background:#1f2937;
}

</style>
</head>

<body>

<div class="container">
<h1>Periodic Trainer Pro</h1>

<div id="settings">
  <label>Mode</label>
  <select id="mode">
    <option value="both">Mixed</option>
    <option value="nameToSymbol">Name → Symbol</option>
    <option value="symbolToName">Symbol → Name</option>
  </select>

  <label>Range</label>
  <input id="minAtomic" type="number" value="1">
  <input id="maxAtomic" type="number" value="20">

  <label>Rounds</label>
  <input id="rounds" type="number" value="10">

  <button onclick="startGame()">Start</button>
</div>

<div id="game">
  <div id="question"></div>
  <input id="answer" />
  <button onclick="submitAnswer()">Submit</button>

  <div id="feedback"></div>
  <div id="score"></div>

  <div id="endButtons" class="end-buttons" style="display:none;">
    <button onclick="redoMistakes()" id="mistakeBtn">Redo mistakes (once)</button>
    <button onclick="startGame()">Redo same settings</button>
    <button onclick="resetAll()">Reset settings</button>
  </div>
</div>

</div>

<script>

/* ================= DATA ================= */

const names = [/* unchanged full list */];
const symbols = [/* unchanged full list */];

const baseElements = names.map((n,i)=>({
  num:i+1,
  name:n,
  symbol:symbols[i],
  interval:0,
  ease:2.5,
  reps:0,
  nextDue:0
}));

/* ================= STATE ================= */

let deck=[];
let current=null;
let mode="both";
let round=0;
let total=10;
let correct=0;
let missed=[];
let mistakeReplayUsed=false;

/* ================= SRS ================= */

function updateCard(card,q){
  if(q<3){
    card.reps=0;
    card.interval=1;
    card.ease=Math.max(1.3,card.ease-0.2);
  }else{
    card.reps++;
    if(card.reps===1) card.interval=1;
    else if(card.reps===2) card.interval=3;
    else card.interval=Math.round(card.interval*card.ease);

    card.ease+=0.1;
    card.ease=Math.max(1.3,card.ease);
  }

  card.nextDue = round + card.interval;
}

/* ================= PICK ================= */

function pick(){
  const due = deck.filter(c=>c.nextDue<=round);
  if(due.length) return due[Math.floor(Math.random()*due.length)];
  return deck[Math.floor(Math.random()*deck.length)];
}

/* ================= START ================= */

function startGame(custom){
  mode=document.getElementById('mode').value;

  const min=+document.getElementById('minAtomic').value;
  const max=+document.getElementById('maxAtomic').value;

  deck=(custom||baseElements)
    .filter(e=>e.num>=min&&e.num<=max)
    .map(e=>({...e}));

  round=0;
  correct=0;
  total=+document.getElementById('rounds').value;

  missed=[];
  mistakeReplayUsed=false;

  document.getElementById('settings').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('endButtons').style.display='none';

  next();
}

/* ================= NEXT ================= */

function next(){
  if(round>=total){
    endGame();
    return;
  }

  current=pick();

  const ask = mode==="both"?Math.random()<0.5:mode==="nameToSymbol";
  current.ask=ask;

  document.getElementById('question').textContent =
    ask?`Symbol for ${current.name}?`:`Name for ${current.symbol}?`;

  document.getElementById('answer').value="";
  document.getElementById('feedback').textContent="";

  document.getElementById('answer').focus();

  update();
}

/* ================= END GAME ================= */

function endGame(){
  document.getElementById('question').textContent="Finished";
  document.getElementById('feedback').textContent=`Score ${correct}/${total}`;

  document.getElementById('endButtons').style.display='block';

  const btn = document.getElementById('mistakeBtn');

  if(missed.length===0){
    btn.style.display='none';
  } else {
    btn.style.display='block';
    btn.textContent = mistakeReplayUsed
      ? "Redo mistakes (already used)"
      : "Redo mistakes (once)";
  }
}

/* ================= ANSWER ================= */

function submitAnswer(){
  const v=document.getElementById('answer').value.trim().toLowerCase();
  const a=current.ask?current.symbol.toLowerCase():current.name.toLowerCase();

  const ok=v===a;

  if(ok){
    correct++;
    updateCard(current,5);
  }else{
    missed.push(current);
    updateCard(current,2);
  }

  document.getElementById('feedback').textContent =
    ok?"Correct":"Answer: "+a;

  round++;
  update();

  setTimeout(next,400);
}

/* ================= REDO MISTAKES ================= */

function redoMistakes(){
  if(mistakeReplayUsed || missed.length===0) return;

  mistakeReplayUsed=true;

  deck=missed.map(e=>({...e}));
  missed=[];

  round=0;
  correct=0;

  document.getElementById('endButtons').style.display='none';

  next();
}

/* ================= RESET ================= */

function resetAll(){
  document.getElementById('settings').style.display='block';
  document.getElementById('game').style.display='none';

  deck=[];
  missed=[];
  round=0;
  correct=0;
}

/* ================= UI ================= */

function update(){
  document.getElementById('score').textContent =
    `${round}/${total} • ${correct} correct`;
}

/* ================= ENTER ================= */

document.addEventListener('keydown',e=>{
  if(e.key==='Enter') submitAnswer();
});

</script>

</body>
</html>
