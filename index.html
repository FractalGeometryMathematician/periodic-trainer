<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Periodic Trainer Pro</title>

<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --accent: #6366f1;
  --text: #e5e7eb;
  --muted: #9ca3af;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: linear-gradient(160deg,#020617,#0f172a);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 1rem;
}

.container {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h1 {
  text-align: center;
  font-size: 1.5rem;
  margin-bottom: 1rem;
}

input, button {
  width: 100%;
  padding: 0.8rem;
  margin-top: 0.6rem;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
}

input {
  background: #020617;
  color: white;
  border: 1px solid #1f2937;
}

button {
  background: var(--accent);
  color: white;
  font-weight: bold;
}

button:active {
  transform: scale(0.98);
}

#question {
  font-size: 1.2rem;
  text-align: center;
  margin: 1rem 0;
}

#feedback {
  text-align: center;
  font-weight: bold;
  min-height: 1.5rem;
}

#score {
  text-align: center;
  font-size: 0.9rem;
  color: var(--muted);
}

.hidden { display:none }

@media (max-width: 500px) {
  .container { padding: 1rem; }
  h1 { font-size: 1.3rem; }
}
</style>
</head>

<body>
<div class="container">
  <h1>⚛️ Trainer Pro</h1>

  <div id="settings">
    <label>Mode</label>
    <select id="mode">
      <option value="both">Mixed</option>
      <option value="nameToSymbol">Name → Symbol</option>
      <option value="symbolToName">Symbol → Name</option>
    </select>

    <label>Rounds</label>
    <input type="number" id="rounds" value="10">

    <button onclick="startGame()">Start</button>
  </div>

  <div id="game" class="hidden">
    <div id="question"></div>
    <input id="answer" placeholder="Answer">
    <button onclick="submitAnswer()">Submit</button>
    <div id="feedback"></div>
    <div id="score"></div>
    <button id="replayBtn" class="hidden" onclick="replayMissed()">Replay Missed Only</button>
  </div>
</div>

<script>
const elements = [...Array(118)].map((_,i)=>i+1).map(n=>{
  const names=["HYDROGEN","HELIUM","LITHIUM","BERYLLIUM","BORON","CARBON","NITROGEN","OXYGEN","FLUORINE","NEON","SODIUM","MAGNESIUM","ALUMINUM","SILICON","PHOSPHORUS","SULFUR","CHLORINE","ARGON","POTASSIUM","CALCIUM","SCANDIUM","TITANIUM","VANADIUM","CHROMIUM","MANGANESE","IRON","COBALT","NICKEL","COPPER","ZINC","GALLIUM","GERMANIUM","ARSENIC","SELENIUM","BROMINE","KRYPTON","RUBIDIUM","STRONTIUM","YTTRIUM","ZIRCONIUM","NIOBIUM","MOLYBDENUM","TECHNETIUM","RUTHENIUM","RHODIUM","PALLADIUM","SILVER","CADMIUM","INDIUM","TIN","ANTIMONY","TELLURIUM","IODINE","XENON","CESIUM","BARIUM","LANTHANUM","CERIUM","PRASEODYMIUM","NEODYMIUM","PROMETHIUM","SAMARIUM","EUROPIUM","GADOLINIUM","TERBIUM","DYSPROSIUM","HOLMIUM","ERBIUM","THULIUM","YTTERBIUM","LUTETIUM","HAFNIUM","TANTALUM","TUNGSTEN","RHENIUM","OSMIUM","IRIDIUM","PLATINUM","GOLD","MERCURY","THALLIUM","LEAD","BISMUTH","POLONIUM","ASTATINE","RADON","FRANCIUM","RADIUM","ACTINIUM","THORIUM","PROTACTINIUM","URANIUM","NEPTUNIUM","PLUTONIUM","AMERICIUM","CURIUM","BERKELIUM","CALIFORNIUM","EINSTEINIUM","FERMIUM","MENDELEVIUM","NOBELIUM","LAWRENCIUM","RUTHERFORDIUM","DUBNIUM","SEABORGIUM","BOHRIUM","HASSIUM","MEITNERIUM","DARMSTADTIUM","ROENTGENIUM","COPERNICIUM","NIHONIUM","FLEROVIUM","MOSCOVIUM","LIVERMORIUM","TENNESSINE","OGANESSON"];
  const symbols=["H","He","Li","Be","B","C","N","O","F","Ne","Na","Mg","Al","Si","P","S","Cl","Ar","K","Ca","Sc","Ti","V","Cr","Mn","Fe","Co","Ni","Cu","Zn","Ga","Ge","As","Se","Br","Kr","Rb","Sr","Y","Zr","Nb","Mo","Tc","Ru","Rh","Pd","Ag","Cd","In","Sn","Sb","Te","I","Xe","Cs","Ba","La","Ce","Pr","Nd","Pm","Sm","Eu","Gd","Tb","Dy","Ho","Er","Tm","Yb","Lu","Hf","Ta","W","Re","Os","Ir","Pt","Au","Hg","Tl","Pb","Bi","Po","At","Rn","Fr","Ra","Ac","Th","Pa","U","Np","Pu","Am","Cm","Bk","Cf","Es","Fm","Md","No","Lr","Rf","Db","Sg","Bh","Hs","Mt","Ds","Rg","Cn","Nh","Fl","Mc","Lv","Ts","Og"];
  return {num:n,name:names[n-1],symbol:symbols[n-1]};
});

let deck=[],queue=[],missed=[],current,mode,round=0,total=10,correct=0;

function schedule(element,success){
  const delay = success ? 3 : 1;
  queue.push({element,due:round+delay});
}

function pick(){
  const due = queue.filter(c=>c.due<=round);
  if(due.length){
    const c = due.shift();
    queue = queue.filter(x=>x!==c);
    return c.element;
  }
  return deck[Math.floor(Math.random()*deck.length)];
}

function startGame(customDeck){
  mode = document.getElementById('mode').value;
  total = +document.getElementById('rounds').value;

  deck = customDeck || [...elements];
  queue=[];
  missed=[];
  round=0; correct=0;

  document.getElementById('replayBtn').classList.add('hidden');

  document.getElementById('settings').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');

  next();
}

function next(){
  if(round>=total){
    document.getElementById('question').textContent="Done";
    document.getElementById('feedback').textContent=`Score ${correct}/${total}`;

    if(missed.length){
      document.getElementById('replayBtn').classList.remove('hidden');
    }
    return;
  }

  current = pick();
  const askSymbol = mode==='both'?Math.random()<0.5:mode==='nameToSymbol';
  current.askSymbol = askSymbol;

  document.getElementById('question').textContent = askSymbol
    ? `Symbol for ${current.name}?`
    : `Name for ${current.symbol}?`;

  document.getElementById('answer').value='';
  document.getElementById('answer').focus();
  document.getElementById('feedback').textContent='';
  updateScore();
}

function submitAnswer(){
  const val = document.getElementById('answer').value.trim().toLowerCase();
  const correctAns = current.askSymbol ? current.symbol.toLowerCase() : current.name.toLowerCase();

  const isCorrect = val===correctAns;

  if(isCorrect){
    correct++;
    document.getElementById('feedback').textContent='✅';
  } else {
    document.getElementById('feedback').textContent=`❌ ${correctAns}`;
    missed.push(current);
  }

  schedule(current,isCorrect);
  round++;
  updateScore();
  setTimeout(next,600);
}

function replayMissed(){
  startGame(missed);
}

function updateScore(){
  document.getElementById('score').textContent=`${round+1}/${total} • ${correct} correct`;
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter') submitAnswer();
});
</script>
</body>
</html>
